services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - '27017:27017'

  app:
    build: .
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/quickchatter
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - mongo

volumes:
  mongo-data:
